<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Sin conexion | Zyvola</title>

</head>
<body>
    <main class="calculator-page-section" role="main">

                    <div class="result-label">Que puedes hacer</div>

                </div>
                <div class="button-group">
                    <a href="/" class="btn-primary calculator-back-link">Volver al inicio</a>
                </div>
            </section>
        </div>
    </main>
