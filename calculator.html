<!DOCTYPE html>
<html lang="es">
<head>
        <!-- SEO: codificación explícita para indexación correcta -->
    <meta charset="UTF-8">
        <!-- SEO: viewport para mobile-first rendering -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- SEO: descripción específica de página interna -->
        <meta name="description" content="Interfaz de cálculo financiero de Zyvola con resultados dinámicos para inversión, ahorro, préstamos e impuestos.">
        <!-- SEO: indexación controlada para página de detalle -->
        <meta name="robots" content="index,follow,max-image-preview:large">
    <meta name="theme-color" content="#1a1a1a">
    <!-- SEO/PWA técnico: manifiesto de aplicación web -->
    <link rel="manifest" href="manifest.json">
        <!-- SEO: title optimizado de página de calculadora -->
        <title>Calculadora Financiera | Zyvola</title>
        <!-- SEO: canónica de la vista de calculadora -->
        <link rel="canonical" href="https://calculadorasfinancierasonline.com/calculator.html">

        <!-- SEO social: Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:locale" content="es_ES">
        <meta property="og:site_name" content="Zyvola">
        <meta property="og:title" content="Calculadora Financiera | Zyvola">
        <meta property="og:description" content="Calcula escenarios financieros con la interfaz dedicada de Zyvola.">
        <meta property="og:url" content="https://calculadorasfinancierasonline.com/calculator.html">
        <meta property="og:image" content="assets/zyvola-logo.png">

        <!-- SEO social: Twitter Cards -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Calculadora Financiera | Zyvola">
        <meta name="twitter:description" content="Calcula escenarios financieros con la interfaz dedicada de Zyvola.">
        <meta name="twitter:image" content="assets/zyvola-logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

        <!-- SEO estructurado: BreadcrumbList de navegación -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "BreadcrumbList",
            "itemListElement": [
                {
                    "@type": "ListItem",
                    "position": 1,
                    "name": "Inicio",
                    "item": "https://calculadorasfinancierasonline.com/"
                },
                {
                    "@type": "ListItem",
                    "position": 2,
                    "name": "Calculadora",
                    "item": "https://calculadorasfinancierasonline.com/calculator.html"
                }
            ]
        }
        </script>
</head>

            <div class="navbar-logo">
                <span class="logo-mark-wrap">
                                        <img src="assets/zyvola-logo.png" alt="Logotipo de Zyvola" class="logo-mark" decoding="async" fetchpriority="high">

        </div>

    <!-- Rendimiento: carga diferida sin bloquear render inicial -->

</body>
</html>
